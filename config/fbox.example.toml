# fbox runtime defaults
# Kopiere diese Datei nach ~/.config/fbox/config.toml oder nutze scripts/install_ubuntu.sh bzw. scripts/install_windows.ps1.

default_profile = ""           # Profil das ohne -p verwendet wird ("" = kein Profil)

# --- Container ---
default_image = "ubuntu:24.04"
default_shell = "/bin/bash"

# --- Netzwerk ---
default_network = "bridge"

# --- Sicherheit / Berechtigungen ---
root_mode = "root"
gpu_vendor = "none"

# --- Dateisystem ---
workspace_readonly = false
extra_mounts_readonly = true
extra_mounts = []              # z.B. ["~/.cache/huggingface:~/.cache/huggingface:rw"]
tmpfs = "/tmp:rw,noexec,nosuid"  # leer = deaktiviert

# --- Ressourcen ---
memory_limit = ""              # z.B. "4g", "" = kein Limit
pids_limit = 0                 # 0 = kein Limit

# --- Erweitert ---
extra_flags = []

# --- Werkzeug / Installation ---
editor_command = "code --wait"
install_wrapper_path = "~/.local/bin/fbox"

[profiles.sandbox]
default_network = "none"
root_mode = "host-user"
workspace_readonly = true
memory_limit = "4g"
pids_limit = 512

[profiles.fbra-dev-rocm]
default_image = "fbra-dev-rocm:latest"
default_network = "bridge"
root_mode = "host-user"
gpu_vendor = "amd"
extra_mounts = ["~/.cache/huggingface:~/.cache/huggingface:rw"]
tmpfs = "/tmp:rw,exec,nosuid"
extra_flags = [
  "--cap-add", "CHOWN",
  "--cap-add", "FOWNER",
  "--cap-add", "DAC_OVERRIDE",
  "--cap-add", "SETUID",
  "--cap-add", "SETGID",
]

[profiles.fbra-dev-llm]
default_image = "fbra-dev-llm:latest"
default_network = "bridge"
root_mode = "host-user"
gpu_vendor = "amd"
extra_mounts = [
  "~/.cache/huggingface:~/.cache/huggingface:rw",
  "~/.claude/.credentials.json:~/.claude/.credentials.json:rw",
  "~/.codex/auth.json:~/.codex/auth.json:rw",
  "~/.opencode/opencode.json:~/.opencode/opencode.json:rw",
  "~/.local/share/opencode/auth.json:~/.local/share/opencode/auth.json:rw",
]
tmpfs = "/tmp:rw,exec,nosuid"
extra_flags = [
  "--cap-add", "CHOWN",
  "--cap-add", "FOWNER",
  "--cap-add", "DAC_OVERRIDE",
  "--cap-add", "SETUID",
  "--cap-add", "SETGID",
]

[profiles.fbra-running]
default_image = "fbra-running:latest"
default_network = "bridge"
root_mode = "host-user"
gpu_vendor = "amd"
extra_mounts = [
  "~/.cache/huggingface:~/.cache/huggingface:rw",
  "~/.claude/.credentials.json:~/.claude/.credentials.json:rw",
  "~/.codex/auth.json:~/.codex/auth.json:rw",
  "~/.opencode/opencode.json:~/.opencode/opencode.json:rw",
  "~/.local/share/opencode/auth.json:~/.local/share/opencode/auth.json:rw",
]
tmpfs = "/tmp:rw,exec,nosuid"
extra_flags = [
  "--cap-add", "CHOWN",
  "--cap-add", "FOWNER",
  "--cap-add", "DAC_OVERRIDE",
  "--cap-add", "SETUID",
  "--cap-add", "SETGID",
]
